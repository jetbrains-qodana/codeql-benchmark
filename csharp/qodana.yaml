version: "1.0"

profile:
  base:
    name: empty
  groups:
    - groupId: IncludedInspections
      groups:
        - "category:OpenGrep"
  inspections:
    - group: IncludedInspections
      enabled: true

linter: jetbrains/qodana-dotnet:2026.1